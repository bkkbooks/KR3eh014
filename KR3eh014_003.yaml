body:
  text: 卷下目痛目赤腫痛人知降火而不知活血所以不得力只用四物湯內地黃用生芍藥用赤加酒蒸大黃赤茯苓薄荷葉治之甚妙此戴復庵法又云早晨鹽湯下養正丹二三十粒又云若眼赤久而不愈用諸眼藥不效早用蘇子降氣湯下黑鉛丹臨臥則以消風散下三黃丸日中則以酒調黑神散此數藥不獨治久赤眼諸眼皆治之降火必兼活血發前人所未發若不活血寒仍凝澀火何由而降氣血流通火亦隨之而降矣口糜經云膀胱移熱於小腸膈腸不便上為口糜宜以清涼之劑利小便用五苓導赤散卻合服之神效又云少陽之火氣內發熱上為口糜則又當用苦寒之劑也如二法不效則宜炮薑之類反佐之身重身重之症時師止知燥濕而不知補虛素問示從容論篇歷言肝虛腎虛脾虛皆令人體重煩冤足知身重乃虛症也宜補中益氣湯加減八味丸消息與之正所虛則邪易侵感治標不治本非法也脅痛九靈山房集云昔鍾姓者一男子病脅痛衆醫以為癰也設諸香薑桂之屬益甚項彥章診其脈告曰此腎邪病法當先溫利而後補之投神保丸下黑溲痛止即令更服神芎丸若疑其太過彥章曰向用神保丸以腎邪透膜非全蠍不能導引然巴豆性熱非得芒硝大黃蕩滌之後遇熱必再作乃大泄數次病已項彥章所以知男子之病以陽脈弦陰脈微澀弦者痛也澀者腎邪有餘也腎邪上薄於脅不能下且腎惡燥熱方發之非得利不愈經曰痛隨利減殆謂此也房勞過度腎虛羸怯之人胸脅之間每有隱隱微痛此腎虛不能約氣虛不能生血之故氣與血猶水也盛則流暢少則壅滯故氣血不虛則不滯既虛則鮮有不滯者所以作痛宜用破故紙之類補腎芎歸之類和血若作尋常脅痛治則殆矣當辨左右氣血而施治痛在左肝火挾氣也痛在右脾火挾痰食也治從潤肺柔肝而得捷效乃肝移邪於肺之明證也腰痛腰者腎之所附腎氣虛而邪客之則能作痛邪者風熱濕燥寒也大抵寒濕多而風熱少有風有濕有寒有熱有挫閃有瘀血有滯氣有痰積風傷腎而痛其脈必帶浮或左或右痛無常處牽引兩足宜五積散每服加防風五分或加全蠍三個尤好小續命湯獨活寄生湯皆可選用仍合三仙丹杜仲薑汁炒研末每一錢空心溫酒調服名杜仲酒治腎氣腰痛兼治風冷為患傷濕而痛如坐水中蓋腎屬水久坐水濕處或為兩露所著濕流入足太陽經以致腰痛其脈必帶緩遇天陰或久坐必發身體必帶遲重宜滲濕湯主之不效宜腎著湯或生附湯感寒而痛者腰間如水其脈必緊見熱則減見寒則增宜五積散去桔梗加吳茱萸五分或薑附湯加辣桂杜仲主之傷熱而痛者脈必洪數而滑發渴便閉宜甘豆湯加續斷天麻間服敗毒散若因挫閃或攧撲傷損而痛者宜乳香趁痛散及黑神散和復元通氣散酒調下不效則必有惡血停滯宜先用酒調服蘇合香丸以五積散加大黃五分蘇木五分當歸倍元散若因勞役負重而痛宜用和氣散或普賢正氣散楊仁齋云勞力而痛宜十補湯下青娥丸瘀血為痛其脈必澀轉側若錐刀之刺大便黑小便赤或黑日輕夜重名瀝血腰痛宜蘇沉麝香丸及桃仁酒調黑神散或四物湯加桃仁紅花枳殼烏藥之屬丹溪用補陰丸中加桃仁紅花主之氣滯而痛其脈必沉若鬱悶而不伸宜人參順氣散烏藥順氣散加五加皮木香甘草少許煎湯調下痰注而痛其脈必滑或伏宜二陳湯加南星香附枳殼主之大抵諸腰痛皆起於腎虛既挾邪氣則須除其邪如無外邪積滯而自痛則惟補腎而已腰肢痿弱身體疲倦腳膝痠軟脈或洪或細而皆無力脈細便清為陽虛重按必沉而無力是其候也亦分寒熱二症脈細而無力怯怯短氣小便清利是為陽虛宜腎氣丸茴香丸並戴復庵法以大建中湯加川椒十粒下腰腎丸及生料鹿茸丸之類仍以豬腰切作薄片勿令斷層層摻炒茴香末濕紙裹煨熟細嚼酒下此所以補陽之不足也脈洪大而無力脈洪大無力為陰虛其小便必黃赤小便黃赤虛火時炎是為陰虛東垣所謂膏粱之人久服湯藥醉以入房損其真氣則腎氣熱腎氣熱則腰脊痛不能舉久則髓減骨枯發為骨痿宜六味地黃丸滋腎丸封髓丹之類治陰之不足也楊仁齋云經曰腰者腎之府轉搖不能腎將憊矣審如是則病在少陰必究其受病之源而處之為得雖然宗筋聚於陰器脹者腎之同系也五臟皆取氣於谷脾者腎之倉廩也鬱怒傷肝則諸經縱弛憂思傷脾則胃氣不行二者皆能為腰痛之寇故並及之鬱怒傷肝發為腰痛宜調肝散主之憂思傷脾發為腰痛宜沉香降氣湯和調氣散薑棗煎主之又有沮挫失志傷腎而痛者和劑七氣湯多加白茯苓少加沉香乳香主之保命集云煨腎丸治肝腎損及脾損穀不化腰痛不起者神效瘧痢後腰痛及婦人月經行後腰痛俱屬虛宜補之於氣血藥加杜仲側柏葉主之丹溪云久腰痛必用官桂開之方止腹脅痛亦然橘香丸治腰痛經久不瘥用官桂亦開之意也腰為腎府若腎氣虛隨六淫之邪為轉移則痛作調其榮衛損有餘補不足究其致痛之由而治之為得也虛損補精之藥固忌溫熱然以天道驗之時非溫熱則地氣不能升而為雨人身之道何莫不由斯然則腎氣雖寒補實資乎溫助故昔人蓯蓉巴戟故紙茴香之類發揚腎氣使陰陽交蒸而生精知此理也自丹溪出而以黃柏知母為補腎之藥誤人多矣夫黃柏知母知母黃柏僅可用於火熾體盛者初期暫服久則反從火化雖北方寒水之氣而生然其性降而不升殺而不生暫用其寒可以益水久服其苦反能助火經不云乎久而增氣物化之常也氣增而久夭之由也可不慎歟加減四柱飲治虛勞短氣乏力語言無力飲食少思者人參黃耆乾山藥白茯苓熟附子五分去皮臍童便換浸三晝夜紙裹煨三次咀片川椒紅二十四粒去目及閉口者上生薑三片棗一枚煎服勞瘵瑣碎録云男子勞傷而得瘵疾漸見瘦瘠用童便二盞無灰酒一盞以新瓷瓶貯之入全豬腰一對取血肉有情之品以類相從故收效速是損其腎者益其精補之於味也泥封日晚慢火養熟至中夜止五更初更以火溫之飲酒食腰子病篤者只一月效平日瘦怯者亦宜服此蓋以血養血勝一切金石草木之藥也祕方治虛症有火服參耆則作喘嗽服歸地則少飲食服降火滋陰藥則反削元氣而火又不降宜用此方甘枸杞石斛酒蒸多用麥門冬去必多用天門冬乾山藥以上五味皆補虛藥而甘涼者又不滯脾氣以虛症有火者絶妙山茱萸酸棗仁炒研多用薏苡仁白茯苓若咳嗽宜用五味子十餘粒乾薑二三分薄荷四五分忌桑皮杏仁蘇子降氣等藥若發躁宜倍用收斂之藥攝火歸源忌用知母黃柏苦寒之藥犯之則躁愈甚矣夢遺王海藏云余嘗治脫精不止者以澀劑止之不能不若瀉心火瀉心火不能止之不若用升陽之劑如風藥之類止之風藥善升使陽氣上舉而不下降也非能止之也舉其氣上而不下也藥要或問云鄭叔魯年二十餘攻舉業夜讀書至四鼓猶未已忽發病臥間但陰著物便夢交接脫精懸空則無懸飲食日減倦怠少氣蓋以用心太過二火俱起夜不得眠血不歸經腎水不足火乘陰虛陰虛火炎鼓灼精房失於退藏而外泄也入客下焦鼓其精房則精不得聚藏而欲走因陰著物由厥氣客之故作接內之夢於是上補心安神中調脾胃升舉其陽下用益精生陰固陽之劑不三月而病安矣醫學集成記江單醫云遺泄一症尋常只治心腎未有別治以素問仲景考之當服此屢效丸方厚朴薑製二兩羊脛三兩炭火煅通紅窨殺別研細如粉上二味陳黃米糊丸桐子大每服百丸至三百丸米湯下不得臥九靈山房集云浙省平章左答納失理在帥閫時病無睡睡則心悸神懾如處孤壘而四面受敵達旦目眵眵無所見耳瞶瞶無所聞雖堅臥密室睫未嘗交也即選醫之良者處劑纍月勿瘳後召元膺翁診視翁切其脈左關之陽浮而虛察其色少陽之支溢於目眥即告之曰此得之膽虛而風上獨治其心而不祛其膽之風非法也因投藥方烏梅湯抱膽丸日再服遂熟睡一方治多疑不得眠如狂用溫膽湯加酸棗仁一兩炒研煎從來不寐之證前人皆以心腎不交治也投劑無效竊思陰陽違和二氣亦不交椿田每用製半夏夏枯草各五錢取陰陽相配之義濃煎長流水竟覆杯而臥治病切勿執著拘泥古方妙在隨症用藥變通化裁精思過人是為良工妄見道山清話云張子顏少卿晚年嘗目前見白光閃閃中有白衣人如佛相者子顏信之彌謹乃不食肉不飲酒然體瘠而多病矣時泰寧不豫汪壽卿自蜀入京診御脈壽卿醫道盛行其門如市子顏一日從壽卿求診壽卿一見大驚不復言但投以大丸數十小丸千金粒囑曰十日中服之當盡卻以示報既數日視所視白衣人衣變黃而光無所見矣乃欲得肉食思飲酒又明俱無所見覺氣體異他日矣乃詣壽卿以告卿曰吾固知矣公脾初受病為肺所乘心脾之母也公既多疑心氣一不固自然有所睹吾以大丸實其脾小丸補其心肺為脾之子既不能勝其母其病自愈矣子顏大神之因密問所診御脈何如卿曰得春氣當絶雖司命無如之何時元符改元八月矣至三年正月泰寧宴駕壽卿後入華山年已八十汪君診法可謂神而明之辨證用藥精蘊畢呈他人難測者皆有所指歸發熱楊仁齋云凡壯熱煩躁柴胡黃芩解利之其熱乍輕而不退去用黃芩川芎甘草烏梅作劑或用黃連生地黃赤芩同煎臨熟入燈心一捻主之其效亦速蓋川芎生地皆能調血心血一調其熱自退心者君主之官焉心清熱自退善治熱者先調血血調氣疏自無蒸灼之外熱也心法附余云退熱之法全在清心必用麥門冬燈心草白朮茯苓蓋心者一身之主宰而萬事之根本萬令從心心不清則妄動而熱不退然熱又能傷血血滯則氣鬱而熱愈不退退熱之法所以又在調血法用川芎當歸若夫陽浮於外則當斂而降之大法用參苓白朮散薑棗煎服渴治渴必須益血蓋血即津液所化津液既少其血必虛故須益血丸吐血之後多能發渴益知渴病生於血虛也血虛津液不能上承則口渴也盜汗問人之盜汗何氣使然曰陽氣不足而陰氣有餘也衛氣晝行陽二十五度則目張而寤夜行陰亦二十五度則目瞑而臥臥而氣不榮於陽分則腠理開腠理開則津液泄矣陽者衛外而為固者也寤而目張則陽氣復反於陽分故倏然而止也止汗以黃耆為君固其陽也其於五臟有所屬乎曰心主五液而腎主水也人之一身子時一陽生心中有赤液下入於腎午時一陰生腎中有白氣上入於心心腎交水火濟而無病也心腎俱耗則水火不交故至陰之下有僭陽焉骨為之熱矣諸陽之會有純陰焉額為之汗矣額亦心之分也有但見於額與心他處無之者此由心腎俱虛水液枯涸勢不足以周身之汗故但見於心之分也余嘗病怔忡盜汗補心腎尚無功加豬心數片引之遄已藥貴嚮導不可不審也白濁赤白濁總屬腎虛無寒熱之別玄菟丹小菟絲子丸八味丸山藥丸皆可斟酌用之不宜妄用利水清痰燥熱溫涼之藥慎之慎之有因內傷以補中益氣湯主之經曰中氣不足則溲便為之變是也內經謂中氣不足則溲便為之變夫中氣者脾土也脾虛濕熱下注當升清以降濁而濁自愈也有思想不遂意淫於外者宜清其心如遠志茯苓龍骨石蓮菟絲子之類有入房過度傷精而致者宜補其精如鹿角膠肉蓯蓉桑螵蛸之類經曰思想無窮所願不得意淫於外入房太甚宗筋弛縱發為筋痿又為白濁是也有精竭而赤濁虛之極也宜峻補其精若妄用涼藥必至不起又藥要或問曰白濁多因濕熱下流膀胱而來赤白濁即靈樞所謂中氣不足溲便為之變是也先須補中氣使升舉之而後分其臟腑氣血赤白虛實以治之其他邪熱所傷者固在瀉熱補虛設腎氣虛甚或火熱亢極者則不宜峻用寒涼之藥必以反佐之要在權衡輕重而已淋外兄賀晉卿因有不如意事又當勞役之後忽小腹急痛欲溺溺中有白物如膿並血而下莖中急痛不可忍正如滯下後重之狀日數十行更數醫不效問方於余余作瘀血治下以牛膝四兩去蘆酒浸一宿長流水十二碗煎至八碗再入桃仁一兩去皮尖炒紅花二錢五分當歸梢一兩酒浸赤芍藥一兩五錢木通一兩生甘草二錢五分苧麻根二莖同煎至二碗去渣入琥珀末二錢麝香少許分作四服一日夜飲盡勢減大半按素問奇病論云病有癃者一日數十溲此不足也今瘀血雖散宜用地黃丸加菟絲子杜仲益智仁牛膝之屬補腎陰之不足以杜復至因循未及修治遂不得全愈或閉或一夜數十起溺訖痛甚徑服前丸及以補腎之藥入煎劑調理而安從兄淳甫得淋疾日數十溲略帶黃服五苓散頓減因腹中未快多服利藥三五日復忽見血星醫以八正散治之不應索方於余詢知其便後時有物如膿小勞即發診得六脈俱沉細尤甚此中氣不足也便後濃血精內敗也經云中氣不足則溲便為之變宜補中益氣湯加順氣之藥以滋其陽六味地黃丸疏內敗之精以補其陰更加五味子斂耗散牛膝通血脈終劑而安此余初學醫時所録以用藥頗中肯綮故存之小便黃赤有寒熱虛實之別素問曰諸病水液渾濁皆屬於熱宜黃柏知母之類治之此熱症也脈經云尺澀足脛逆冷小便赤宜服附子四逆湯此寒症也素問云胃足陽明之脈盛則身已前皆其有餘胃則消穀善飢溺色黃宜降胃火又云肝熱病者小便先黃宜降肝火皆實症也又云肺手太陰之脈氣虛則肩背痛而寒少氣不足以息溺色變宜補中益氣湯之類又補肺氣又云冬脈者腎脈也冬脈不及則令人眇中清脊痛小便變宜地黃丸之類以助腎脈此虛症也小便遺失責在肺不在腎蓋肺者腎之上源又其母也上源治則下流約矣甲乙經云肺脈不及則少氣不足以息卒遺失無度故東垣云宜安臥養氣禁勞役以黃耆人參之類補之不愈當責有熱加黃柏生地淋有五種氣血砂膏勞今莖中疼痛乃血瘀為患用血藥獲效是治其源也若點滴澀痛為津液涸莖中挾膿者乃中氣不足且肺為水之上源若肺虛氣不上承亦為淋也治驗録辨之晰矣小便不通膀胱者州都之官津液藏焉氣化則能出矣何謂氣化津液乃氣所化也小便不通是氣化不行也經謂膀胱者津液之府氣化則能出矣經脈別論云飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行蓋譬之蒸物然湯氣上熏釜甑遂有液而下滴此脾氣熏蒸肺葉所以遂能調水道而輸膀胱也故小便不通之症審系所虛而水涸者利之益甚須以大補人參少佐升麻煎湯飲之則陽升陰降是地氣上為云天氣下為雨也自然通利矣丹溪嘗治一人傷寒得汗熱退後脈尚洪傷寒得汗脈必洪而無力此洪脈作虛論與人參黃耆白朮炙甘草當歸芍藥陳皮數日其脈仍大又小便不通小腹下妨悶頗為所苦但仰臥則點滴而出日以補藥服之未效於前藥內倍加黃耆人參大劑與服兩日而小便方利強力入房過忍小便而不通者小菟絲子丸六味丸治之多服取效下焦有熱者鳳髓丹滋腎丸之屬楊仁齋云大凡水道不行其本在腎其末在肺合用牽牛澤瀉便自通虛人老人又不在此例王海藏云年老人虛祕是下亡津液也以升麻湯舉之陽升陰降是地氣上為云天氣下為雨也所以通利又云小便不通非小腸膀胱厥陰也強力房勞過忍小便之過也一男子病小便不通他醫治以利藥益甚丹溪診之右寸頗弦滑曰此積痰也積痰在脈脈為上焦而膀胱為下焦上焦閉則下焦塞譬如滴水之器必上竅通而後下竅之水出乃以法大吐吐已病如失經云膀胱者津液之府氣化則能出矣又云肺氣通調水道下泄膀胱脈訣云肝膽同歸津液府所以太陽厥陰同為一治又云膀胱腎合為精府此腎主大小二便難也著眼在肺氣通調水津四布二語大便不通金匱真言論云北方黑色入通於腎開竅於二陰故腎陰虛則大小便難宜以地黃蓯蓉車前子茯苓之屬補真陰利水道少佐辛藥開腠理致津液而潤其燥施之於老人尤宜若大小便燥結之甚求通不得登廁用力太過便仍不通而氣被掙脫下注肛門有時泄清水而裡急後重不可忍者胸膈間梗梗作惡乾嘔有聲渴而索水飲食不進呻吟不絶欲利之則氣以下脫合用葶藶桑白皮二者得兼必然中病其間更以木通滑石佐之尤能透達雖然大便小便脈絡相貫也人有多日小便不通但用神保丸血燥津液涸皆致便難神保丸等治實症固妙而年老液涸者不可不審作葶藶丸大瀉數行小便自利按此法實者可用不可不審二便俱閉只利大便小便須臾自下若氣已脫下之即絶固之則溺與燥矢膨滿腹腸間恐反增劇升之使氣自舉而穢獨不為氣所結自然通利則嘔惡不堪宜何處之家姑八十餘嘗得此患余惟欲調氣利小便之藥雖僅獲效而不收全功嘗慰之令勿性急後因不能忍遽索末藥利下數行不以告余自謂稍快矣而脈忽數動一止氣息奄奄頽然床褥余知真氣已泄若不收攝恐遂不救急以生脈藥投之數劑後結脈始退因合益血潤腸丸與服勸以勿服他藥久之自有奇效如言調理兩月餘而二便通調四肢康勝如平時矣向使圖目前之快蔑探本之明寧免於悔哉便祕是老人常事蓋所固而不泄故能壽考而一時難堪輒躁擾而致疾若求通潤之方非益血而滋腎烏乎可也丸方雖為家姑設而可以通行天下故表而出之以為孝子養親仁人安老之一助云益血潤腸丸熟地黃六兩杏仁炒去皮尖枳殼麩皮炒黃麻仁揀去殼令淨殼反澀大腸也備三兩以上三味各杵膏橘紅三兩五錢阿膠炒肉蓯蓉酥煮透烘乾各一兩五錢蘇子炒研瑣陽酥煮荊芥各一錢上末之以前三味膏同杵千餘下仍加煉蜜丸桐子大每服五六十丸空心白湯下大法云大便祕服神芎丸大便不通小便反利不知燥濕之過本大腸少津液以寒燥之藥治之是以轉燥少服則不濟多服則亡血所以不通若用四物麻子杏仁之類則可經云燥則為枯濕劑所以潤之腎燥便難也益血潤腸丸乃王道之師非神芎丸之瞑眩若津涸液少當用四物潤燥間服益血潤腸丸疝朱丹溪於此道中甚有發明而其臨症處方又多以扶植元氣為主孰慮人遭厄運其手書皆不傳而傳於世者皆為盲夫俗子裁剪增續疵謬實多纂要一書其舛尤甚凡丹溪長處皆為刪去甚可恨也即如疝症一門首載云專主肝經與腎虛而致者甚多肝乃腎之子而前陰腎之竅也欲補其肝能無顧其母乎而世俗執肝無補法之論逢一疝症輒為肝實過用克伐死者多矣今纂要中全不載一補法時師既無正悟之明又無他書足考焉得而不誤也按丹溪云疝有挾虛而發者其脈不甚沉緊而豁大無力者是也當以參術為君疏導藥佐之何嘗封鎖補法哉張仲景治寒疝腹中痛又脅痛裡急者當歸生薑半肉湯主之本草衍義稱其無不應驗豈非補肝之效乎余每治病甚氣上衝心危急者以八味丸投之立應又補腎之一驗也又大便不通者當利大便如許叔微羅謙甫皆用芫花是已今如纂要云不幹腎經則五苓不當用又言疝不可下則芫花不當用而所列者惟數種破血之藥苦辛雜收寒熱無別既不能補肝腎之真陰又不能通利二竅使邪有所泄而耗其氣於冥冥之中且日趨於危而不自覺也豈不悖哉疝有七種治當分別虛實寒熱未可泥於溫補亦不可過用破氣之品景嶽言之詳矣痔論內經生氣通天論云風客淫氣精乃亡邪傷肝也因而飽食筋脈橫解腸澼為痔蓋風氣通於肝而淫氣者陰陽之亂氣也因其相亂而風客之則傷精傷精則邪入於肝矣而又飲食自倍腸胃乃傷陰陽不和關膈壅滯熱毒下注血滲大腸腸澼痔漏安得以免氣虛濕熱下注大腸附骨疽一人生附骨疽膿熟不得泄潰而入腹精神昏憒粥藥不食醫皆束手延余治之診其脈細如蛛絲氣息奄奄欲絶余曰無傷也可以鈹針刺其腹膿大泄然皆清稀時若蟹吐沫在法為透膜不治或譏余余曰無傷也可治參耆附子加厥陰行經之藥大劑飲之為制八味丸丸成服之食大進日啖飯升余約數旬而平余所以知可治者潰瘍之脈洪實者死微細者生今脈微細形病相合知其受補故云可治也所以刺其腹者膿不泄必有內攻之患且按之而知其深即刺之無苦也所以信其不透膜即透膜無損者無惡候也所以服八味者八味丸補腎腎氣壯而上升則胃口開而納食故大進也泄濃既多刀圭之藥其何得濟遷延遲久且有他患故進開胃之藥使多食粱肉以補之肌乃速生此治潰瘍之要法也古瘍醫必審經絡明虛實別臟腑脈候榮衛氣血之源非今之瘍醫僅知敷貼不明經絡臟腑是庸工也乳癰庚午余自秋闈歸則亡妹已病蓋自七月乳腫痛不散八月火針取膿醫以十全大補湯與之外敷鐵箍散不效反加喘悶九月産一女潰勢益大兩乳房爛盡延及胸腋膿水稠黏出膿幾六七升略無斂勢十一月始歸就醫醫改用解毒和中平劑外摻生肌散龍骨寒水石等劑膿出不止流濺所及即腫泡潰膿兩旁紫黑瘡口十數胸前腋下皆腫潰不可動側其勢可畏余謂産後毒氣乘虛而熾宜多服黃耆解毒補血益氣生肌而醫鑑前弊不敢用十二月中旬後益甚瘡口二十餘諸藥盡試不效始改用余藥時膿穢黏滯煎楮葉豬蹄湯沃之頓爽乃制一方名黃耆托裡湯黃耆甘溫以排膿益氣生肌為君甘草補胃氣解毒當歸身和血生血為臣升麻葛根漏蘆為足陽明本經藥及連翹防風皆散結疏經栝蔞仁黍黏子解毒去腫皂角刺引至潰處白芷入陽明敗膿生肌又用川芎三分及肉桂炒柏為引用每劑入酒一盞煎送白玉霜丸疏膿解毒時膿水稠黏方盛未已不可遽用龍骨等藥理宜追之乃制青霞散外摻明日膿水頓稀痛定穢解始有向安之勢至辛未新正患處皆生新肉有紫腫處俱用蔥尉法隨手消散但近腋足少陽分尚未斂乃加柴胡一錢青皮三分及倍用川芎膿水已盡者即用戴糝散摻之至元霄後遂全安凡治癰疽須審經絡部分今所患正在足陽明之分少侵足少陽經分俗醫不復審別一概用藥藥無嚮導終歸罔功甚可嘆也近有患之劇甚如亡妹所苦者一癢友就余求方余以冗未及應諸瘍醫卒拱手以待斃余甚傷之議布其方不忍自祕也隆慶辛未九月九日記古名醫見病知源況必先審經絡部分然後制方用之咸宜惟世風不古庸工藉以需索而病家亦甘受其欺詐若稍劇之患每束手無策金壇心存濟世疾苦特將祕方刊布以廣流傳也青霞散治癰疽潰爛膿多不斂先用楮葉豬蹄湯洗過以此敷之飛青黛二錢乳香一錢五分沒藥一錢五分韶粉一錢海螵蛸一錢枯礬一錢白蘞一錢寒水石一錢冰片三分紅粉霜另研極細和勻後再研入一錢杏仁去皮尖二十四個有死肉加白丁香五分大癰疽爛甚腐多加銅緑一錢五分此方專治潰瘍因血熱肉腐化而為膿故用青黛涼血解毒而使肉無腐為君乳香沒藥活血止痛而消腫為臣寒水石之寒佐青黛以涼血肉使不腐枯礬之收澀排腫而追毒韶粉海螵蛸之收濕止膿汁之多而不燥霜粉之拔毒白蘞之斂創冰片之透肌以為佐使諸藥多燥又假杏仁之油以潤之此制方之旨也子嗣嚴冬之後必有陽春是知天地之間不收斂則不能發生不中和則不能發生自然之理也今人既昧收藏之理縱欲竭精以耗散真氣靡所不至及其無子既云血冷又謂精寒燥熱之劑投而真陰益耗矣安得有子大抵無子之故不獨在女亦多由男子男子房勞過度施泄過多精清如水或冷如冰及思慮無窮謀望高遠皆難有子蓋心主神有所施則心馳於外致君火傷而不能降腎主智有所勞則智亂於中俾腎虧而不能升上下不交水火不構而能生育者未之有也求嗣者廣積陰功然後節欲保精自獲天錫佳兒非徒恃藥餌無益而有損慎之余治驗録中已縷晰言之矣又有天稟男子陰痿女子瘕疝及體肥脂實者皆無子之端不可執一而治治之之法若系房勞過度精清如水冷如冰者六神丸主之精竭者五味補精丸主之精方衰微不能遠射者六子丸主之稟賦元弱氣血虛損者腎氣丸加鹿茸主之思慮多與心火太盛不能節欲者大鳳髓丹主之仍以六神丸間服上下午服臨臥服定志丸或安神丸之類若審系虛寒者固真丸亦可服其陰痿痹等症仍當於本症門求之女人無子當調其經於月事門求之調經首在治肝滋水肝氣為患婦女尤甚往往左脅下痞積脹滿嘔逆皆先天肝血不足治從滋養則平若誤投疏伐則殆若血虧肝旺上犯胃脘下侵兩足納食則吐兩足攣痛遂發痙厥乃肝病入絡因血少不能流通慎勿執肝無補法妄用克伐宜滋水生肝乙癸同源之治若體中有熱者增損地黃丸艾附當歸丸主之仍間服逍遙散若稟賦素弱及脾胃氣虛不能榮養衝任者補中丸主之肢體本實但多鬱怒遂致月事失期不能成孕者煮附丸或香附散主之體肥脂實不能成孕者良方蕩胞之法並坐導之法亦可採用亦當常服經驗育胎丸若的系稟受素弱起居失節恣啖生冷致子宮虛寒不能成孕者宜以育胎丸為主壬子丸之類亦可間服以上服藥之時俱宜謹戒房室方能奏功即念慮之間亦不可輕動蓋心火一動真精即從而走失前功盡棄矣戒之戒之按種子之道有四一曰擇地二曰養種三曰乘時四曰投虛何謂地母血是也何謂種父精是也何謂時精血交感之會是也何謂投虛去舊生新之初是也古法以月經行後三十時辰為準過此子宮閉雖交而不孕即乘時之理也總以清心寡欲為最上乘妙法也余治胎産三十餘年遇大險大危之候竟得十全八九者皆用補得法不隨流俗以治標逐瘀為先務余治驗録中擇載甚多參閲可增智識也
