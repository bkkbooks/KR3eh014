body:
  text: 卷上中風素問風論黃帝問曰風之傷人也或為寒熱或為熱中或為寒中或為癘風或為偏枯滑云枯當作風或當作均為風也其病各異其名不同或內至五臟六腑不知其解願聞其説岐伯曰風氣藏於皮膚之間內不得通外不得泄風者善行而數變腠理開則灑然寒閉則熱而悶其寒也則衰食飲其熱也則消肌肉故使人怢而不能食名曰寒熱怢音突忽忘也又音退栗寒戰也風氣與陽明入胃循脈而上至目內眥其人肥則風氣不得外泄則為熱中而目黃人瘦則外泄而寒則為寒中而泣出風氣與太陽俱入行諸脈俞散於分肉之間與衛氣相干其道不利故使肉膹䐜音忿真而有瘍衛氣有所凝而不行故其肉即不仁也癘者有疑當作因榮氣熱胕腐同其氣不清故使鼻柱壞而色敗皮膚瘍潰風寒客於脈而不去名曰癘風滑云此當在上收假癘者上或曰名寒熱五字疑衍以春甲乙傷於風者為肝風以夏丙丁傷於風者為心風以季夏戊己傷於風者為脾風以秋庚辛中於邪者為肺風以冬壬癸中於邪者為腎風風中五臟六腑之俞亦為臟腑之風各入其門戶所中則為偏風風氣循風府而上則為腦風風入系頭則為目風眼寒飲酒中風則為漏風入房汗出中風書云中右為真氣已絶較中左更深余嘗治右偏類中數人皆用養血祛風佐以化痰利濕而愈已於治驗録詳言之參觀即知則為內風新沐中風則為首風久風入中則腸風飧泄外在腠理則為泄風故風者百病之長也至其變化乃為他病也無常方然致有當作皆風氣也帝曰五臟風之形狀不同者何願聞其診及其病態岐伯曰肺風之狀多汗惡風色皏然白時咳短氣書晝日則瘥暮則甚診在眉上其色白仲景云肺中風者口燥而唾身暈而重冒而腫脹心風之狀多汗惡風焦絶善怒哧赤色病甚則言不可快診在口其色赤仲景云心中風者翕翕發熱不能起心中飢食則嘔肝風之狀多汗惡風善悲色微蒼嗌乾善怒憎女子診在目下其色青仲景云肝中風者頭目瞤反脅痛常嘔令人嗜甘脾風之狀多汗惡風身體怠惰四肢不欲動色薄微黃不嗜食論在鼻上其色黃仲景云脾中風者翕翕發熱形如醉人肢中煩重目皮瞤瞤而短氣腎風之狀多汗惡風面龐然浮腫脊痛不能正立其色炱隱曲不利診在肌上其色黑奇病論云有龐然如水狀切其脈大緊身無痛處形不瘦不能食食少名為何病岐伯對曰病生在腎名為腎風不能食善驚而心氣痿者死胃風之狀頸多汗惡風飲食不下膈塞不通腹善滿失衣則䐜脹食寒則泄論形瘦而腹大首風之狀頭面多汗惡風當先風一日則病甚頭痛不可以出內至風日則痛少愈漏風之狀或多汗常不可單衣食則汗出甚則身汗喘息惡風衣常濡口乾善渴不能勞事泄風之狀多汗汗出泄衣上口中乾上漬其風不能勞事身體盡痛則寒中風最宜辨閉脫二症閉症宜開脫症宜固惟當辨其脈虛大以為別至於閉症氣塞亦有六脈俱絶者不得以其無脈而誤認為脫症也中風將發預防之方黃耆蜜炙五錢防風一錢五分人參一錢五分橘紅一錢歸身酒洗二錢五分木通二錢五分山梔一錢甘草五分紅花三分脾胃虛弱語言無力再加人參三錢乾山藥一錢五分薏仁二錢白朮一錢內熱加山梔至二錢仍多啖雪梨妙渴加麥冬二錢五分五味子五分眩暈加明天麻一錢痰多而暈更加旋覆花五分腳膝麻痹無力加杜仲薑汁炒去絲牛膝酒浸石斛酒浸各一錢五分夜臥不安或多驚恐心神不寧加炒酸棗仁茯神各一錢五分上用水二鍾煎至一鍾入竹瀝一杯梨汁一匙溫服無時方書每以六經形證為定法用小續命湯加減豈不知內經云風為百病之長善行而數變必審十二經見證庶無實實虛虛之誚矣中風將發之前未有不內熱者熱極生風能令母實故先輩謂以火為本以風為標治法先以降心火為主心火既降肝木自平矣此實則泄其子之法也若作風治而以辛熱之藥疏之者固貽害不小而調氣一法亦百無一驗明者更精思之太平廣記載唐梁新見一朝士診之曰風疾已深請速歸去其朝士復見鄜州馬醫趙鄂乃復診之言疾危與梁説同矣曰只有一法請官人試吃消梨不限多少咀齕不及絞汁而飲到家旬日惟吃消梨首爽矣此亦降火除熱之驗也本草云有士人病危諸治不應遂就診楊吉老令服雪梨擔余而瘳與此朝士相倣佛卒中之初有決不可吐者有決不可進辛劑即薑湯亦禁用者不可不知今人治五臟氣絶口開手撒眼合遺尿鼻聲如鼾昔人所不治者以大劑參耆濃湯灌之多有得生者可見世無不可醫之證而昔人徒認此證為有餘不知其不足見投之以順氣疏風之藥往往長逝順氣疏風而妄損元真豈可不明辨以悟人哉遂目為氣絶不治之候也則其他之為虛症而為醫所誤或幸而獲痊或不幸而斃者可勝計哉每見時師初用八味順氣散多不得效八味順氣散為治痰多實證之方涉虛者是抱薪救火今人不辨虛實以為治風主劑則遺誤非淺今特正之已而用二陳四物加膽星天麻之類自謂穩當之極可以久而奏功而亦竟無一效何也蓋妄以南星半夏為化痰之藥當歸川芎為生血之劑而泥於成方變通無法故也正不知通血脈助真元非大劑人參不可而有痰者惟宜竹瀝少加薑汁佐之不宜輕用燥劑至於歸地甘黏能滯脾氣使脾精不運何以能愈癱緩豈若人參出陽入陰少則留而多則宜無所不達哉其能通血脈雖明載本草人誰信之里中一老醫右手足廢不起於床者二年矣人傳其不起過數月遇諸途訊之曰吾之病幾危矣始服順氣行痰之藥了地無應驗薄暮神志輒昏度不可支令家人煎進十全大補湯即覺清明遂日服之浹數月能扶策而起無何又能拾策而步矣經云邪之所湊其氣必虛吾治其虛不理其邪而邪自去吾所以獲全也余曰有是哉使進順氣疏風之藥不輟者墓木拱矣然此猶拘於成方不能因病而變通隨時而消息故奏功稍遲吾早為之當不止是也姑書之以俟明者採焉此老始亦服順氣疏風病延載余繼因病久年老氣虛試服補劑而有效遂日進一帖沉疴若失遂保其身然亦不幸之幸執方治病病必殆是也卒中凡卒中之時不可驚惶搬攪只掐其人中徐徐以藥灌之儒門事親記一老人患頭痛吐下灸火後出門見日而僕家人欲揉撲之戴人立止曰大不可攪蓋病人衰老湧泄血脈易亂身體內有灸火外有太陽是以跌僕若又攪之便不救矣惟安神思待之以靜靜便屬水自然無事古人治病先審其用次辨體質強弱然後治之如射之的而市井傭工何能夢見按卒中大症也聊聊數語毋乃太簡乎世稱卒中者初中風時如口眼喎斜半身不遂者內經為偏枯其左癱右瘓及畏腿風皆卒倒後邪淺之見證其舌強不言唇吻不收經稱為痱病即千金風懿之候乃卒倒後邪深之見證而東垣以中腑邪淺易治中臟邪深難治今考樓英孫一奎二家立法分晰最善乃明乎冒傷中三者權輕重而用藥其重者即太陽病頭項痛腰脊強治以桂枝湯謂之傷風其輕者四時皆有為感冒即冒風也治以九味羌活湯加柴胡為各經活套法也其極重者即三陰中寒症及六經卒中症治以辛熱溫中法也瘧凡病多能為寒熱但發作有期者瘧也無定期者諸病也瘧之為病若邪淺則一日一發邪深則間一日或二三日而一發邪在陰陽之分則日與夜各發邪在陽分上半日發邪在陰分則下半日發有先寒後熱者先傷寒後傷風名曰寒瘧有先熱後寒者先傷風而後傷寒名曰溫瘧有但熱不寒者陰虛不能制陽而陽氣獨發名曰疸瘧有但寒不熱者陽虛不能制陰而陰氣獨勝名曰牝瘧至瘧脈自弦弦數者多熱弦遲者多寒弦小緊者下之弦遲者溫之弦緊數清之浮大吐之浮弦數者風發也以飲食消息止之虛微無力為久病洪數無力與微皆虛也脈無力虛微重按幾無皆正虛邪盛之候暑但熱不寒或熱多寒少面垢口渴雖熱退後而身常有汗心熱而煩脈洪而虛風則惡寒自汗煩躁頭疼轉而為瘧風陽氣也故先熱而後寒寒則惡寒而無汗攣痛面慘轉而為瘧寒陰氣也故先寒而後熱二症初發之際風寒在表雖寒熱過後而身體常自疼痛常自畏風宜以發散為主濕則身體重骨節痛嘔逆脹滿因冒襲雨濕汗出澡浴得之食則若飢而不能食食則中滿嘔逆腹痛因飲食無節飢飽有傷得之痰則發時痰涎上壅兀兀欲吐或時眩暈兼平時有痰之人一得瘧即當以豁痰為主古人云無痰不成瘧故也虛則久瘧之後表裡俱虛真元未復瘧雖暫止小勞復來名曰勞瘧大抵間作者多日作者少積則久瘧不止邪氣伏藏脅間結為症癖謂之瘧母大抵感暑邪為多衛氣與邪相併則病作與邪相離則病休並於陰則寒已離於陽則熱止至次日又集而併合則復病也其間日者由邪氣內薄五臟連募原其道遠其氣深其行遲不能與衛氣俱行不得皆出故間日乃作也寒多者宜升其陽使不並於陰則寒自已熱者多宜降其陰使不並於陽則熱自已寒熱交作者一升一降而以滲利之藥從中分之使不交併此祕訣也暑熱則清之風寒則散之濕則燥之有食消食有痰行痰虛者補之有症癖者以緩消之不可急攻也辨症精詳分六氣感傷而加減啓迪後進非淺師其法者細心研究則致病之源亦獲矣主方柴胡一錢五分升麻葛根羌活防風各五分以上五味俱甘辛氣清能升陽氣使離於陰而寒自已知母一錢石膏三錢黃芩枯飄者五分以上三味母芩味苦石膏體重俱性寒而下行故能引陰氣下降使離於陽而熱自已豬苓一錢五分分利陰陽令不交併穿山甲一錢此物能水能陸故借其氣引諸藥出陰入陽穿走經絡無不利道甘草五分調和諸藥嘗聞一方士言瘧忌甘草能助脾經濕熱耳此餘五六年前自制方也尋常治人只一服便止不復發蓋表裡驅逐其邪令無停留之處故寒熱立已而他人得此方者尚為方所泥不能盡操縱變通之妙時或不效緣伏暑鬱蒸滯而為氣鬱而為痰皆為寒熱之根而此無利氣行痰之藥故也今議加薑製厚朴一錢以利氣三和曲一錢五分以行痰更立加減法於後治瘧之法盡於此矣暑瘧熱多寒少者減柴胡以下五味三分之二母芩石膏倍原數用之但熱不寒者去柴胡以下五味及山甲豬苓即非寒熱交併只宜退熱為主故去此七味仍加粳米一勺人參一錢五分石膏善瀉胃氣故用粳米佐之使胃氣不受傷人參亦此意且熱傷氣故用補氣之藥為主此即白虎湯加人參也煎藥外仍宜進消暑丹一二百粒以疏伏暑而行積痰見傷暑門暑病必自汗其無汗者乃當風取涼閉汗不泄而致宜芎蘇散發之見傷寒門不可與白虎湯風瘧宜芎蘇散不必覆蓋衣服待其自然微微汗出卻以本方視寒熱多少發作早晏消息與之蓋為已自汗不可更大發汗故但微微取汗去其寒邪而已寒瘧宜芎蘇散取汗汗不出加麻黃一二錢以發之發後不除以本方消息與之濕瘧用除濕湯一劑服見傷濕門卻以本方消息與之食瘧宜於傷食門中消導之法兼陳平飲局方雙飲子清脾飲俱可服陳平飲乃二陳湯合平胃散也凡虛人久瘧脈弱不能食者慎勿用瘧藥每發五更以人參一兩生薑一兩同煎連進二服立止治瘧之法詳於內經今但言夏秋病瘧而不詳明脈症僅取升散之藥五種苦寒之藥三種雖王金壇得意之作竊有異議誠恐後進誤會不審病原輒用其方未必盡效蓋病有萬變未可執一也諺云執方治病病必殆是也假如正氣不能勝邪若再升散殆矣此方用在初期固能逐邪外出有升降陰陽之妙若正虛久瘧用必增劇余每用白蔻仁一錢易穿山甲取其辛香宣逐膈膜之壅蔽流行榮衛較原方尤效用古方妙在化裁未可拘執則敏捷矣余治久瘧審其所因每以六八味加減何人休瘧為佐詳治驗中但師其法不泥其方痰人身無痰痰者津液所聚也五穀入於胃共糟粕津液宗氣分為三隧故宗氣集於胸中出於喉嚨以貫心肺而行呼吸焉榮氣者泌其津液注之於脈化以為血以榮四末內注五臟六腑以應刻數焉衛氣者出其悍氣之慓疾而先行於四末分肉皮膚之間而不休者也書行於陽夜行於陰常從足少陰之分間行於五臟六腑實則行虛則聚聚則為痰散則還為津液氣血初非經絡臟腑之中別有邪氣穢物號稱曰痰蓋論痰者當詳痰之原痰即水也水即氣之所化故無病不關於氣無病而不有痰痰之清者又為飲乃火不化水者也以為身害必先去之而後已者也余幼喜唾痰俞唾愈多已而戒之每喉間梗梗不可耐輒呷白湯數口咯出口中用舌攪研令碎因而咽之百餘津液滿口即隨鼻中吸氣咽下以意送至丹田默存少頃咽間清泰矣如未清即再漱再咽以化盡為度方咯出時其味甚咸漱久則甘世人乃謂瘀濁之物無澄而復清之理何其謬哉吾嘗渡河矣見舟人掬濁流而入之甕摻入礬末數分即時澄清此可以悟治痰之法也故上焦宗氣不足則痰聚胸膈喉間梗梗鼻息喘短中焦榮氣不足則血液為痰或壅脈道變幻不常下焦衛氣不足則勢不悍疾液隨而滯四末分肉之間麻木壅腫治其本則補之宜先治其標則化之有法略露端倪以須穎者之自悟云痰由津液所凝聚上中下三焦榮氣不足壅塞脈道變幻不測王隱君有曰怪症奇病皆屬於痰善治者調其榮衛諸恙自瘳矣如稠而不清宜用澄之之法散而不收宜用攝之之法下虛上溢宜用復之之法上壅下塞宜用墜之之法何謂澄之之法如白礬有卻水之性既能澄濁流豈不足以清痰乎然猶不可多用至於杏仁亦能澄清而濟水之性清徑能穴地伏流煮而為膠濟水雖清徑惟近世之阿膠偽者日多奈何最能引痰下膈體此用之所謂澄之之法也何謂攝之之法如大腸暴泄脫氣及小便頻數者益智仁一味益智仁善調氣攝涎又能固脫功效至捷最能收功蓋有安三焦調諸氣攝涎唾而固脫滑之妙故醫方每以治多唾者專取其辛而能攝非但溫胃寒而已此所謂攝之之法也何謂復之之法腎間真氣不能上升則水火不交水火不交則氣不通而津液不注於腎敗濁而為痰宜用八味丸地黃山藥山茱萸以補腎精茯苓澤瀉以利水道肉桂附子以潤腎燥肉桂附子熱燥之藥何以能潤曰經不云乎腎惡燥急食辛以潤之開腠理致津液通氣也所謂復之之法也此治腎虛寒痰之良法何謂墜之之法如痰液聚於咽膈之間為嗽為喘為膈為噎為眩為暈大便或時閉而不通宜用養正丹靈砂丹重劑以引之使不並所謂墜之之法也至於寒者熱之熱者寒之微者逆之甚者從之堅者削之客者除之勞者溫之結者散之留者攻之濕者燥之燥者濡之急者緩之損者溫之逸者行之驚者平之薄者劫之開之發之見於素問至真應變不窮尤為治痰之要法在圓機之士熟察而妙用之不可一途而取也若乃虛症有痰勿理其痰但治其虛虛者既復則氣血健暢津液流通何痰之有今人乃謂補藥能滯氣而生痰此聾聵之言流害無窮矣痰乃津液所結固未可盡化但使津液流通何痰之有惟在調血和氣之要丹陽賀魯庵年七十餘膈間有痰不快飲食少思初無大害就醫京口投以越鞠丸清氣化痰丸胸次稍寬日日吞之遂不輟口年餘困頓不堪僦舟來訪問脈於余則大肉已脫兩手脈如遊絲太溪絶不至矣見余有難色因曰吾亦自分必死但膈間脹滿太甚大便祕結不通殊以為苦但得稍寬即瞑目無憾也固強余疏方以至親難辭教用人參白朮之類大劑進之少頃如廁下積痰升許胸膈寬舒更數日而歿夫二丸乃時師常用之藥本欲舒郁適增其痞本欲清痰反速其斃豈不悖哉明效若是而病家乃無悔悟懲創之心豈宿業已深大命垂絶故天塞其衷而使之決不可返耶不然何不論於理而甘就屠戮者之衆也過服辛散正氣暗受其戕久則涸津液之源氣道塞其輸機遂致痰結日盛胸腹愈脹大便久祕遂至大命垂絶嗚呼身無大病而喜服藥者之殷鑑歟喘經云秋脈者肺也秋脈不及則喘呼吸少氣而咳上氣見血下聞病音其治法則生脈散之類是也李明之云腹脹彭彭而喘胸膈滿壅盛而上奔者於症用藥方中多加五味子人參次之麥門冬又次之黃連少許如甚則交兩手而瞀其真氣太虛也若氣短加黃耆五味子人參氣甚去五味子人參加黃芩荊芥穗冬月去荊芥穗加草豆蔻仁仲景治火逆上氣咽喉不利止逆下氣以麥門冬湯主之用麥門冬七升半夏一升人參四兩甘草二兩粳米三合大棗十二枚水一斗二升煮取六升溫服一升日三夜一經云歲火太過炎暑流行肺金受邪民病火氣咳喘又熱淫所勝病寒熱喘咳宜以人參麥冬五味子救肺喘有虛實之分須細辨之生脈散乃熱傷氣虛而設童便炒黃柏降火本事方治咳嗽上喘急以人參一味為末雞子清投新水調下一錢昔有二人同走一含人參一不含俱走三五里許其不含者大喘含者氣息自如乃人參之力也樓全善治一婦人五十餘歲素有痰嗽忽一日大喘痰如泉湧身汗出如油脈浮而洪似命絶之狀速用麥門冬四錢人參二錢五味子一錢五分煎服一帖喘定汗止三帖後痰亦漸少更栝蔞仁白朮當歸芍藥黃芩各一錢服十帖而安喘而無汗煩躁脈浮大者汗之喘而有汗腹滿脈沉實者下之喘有內外感傷之別外感煩躁無汗而喘者宜汗腹滿有汗而喘脈沉實者宜下仲景云上氣喘而躁者屬肺脹欲作風水發汗則愈又云咳而上氣此為肺脹其人喘目如脫狀脈浮大者越婢加半夏湯主之麻黃六兩石膏半斤生薑三兩大棗十五枚甘草一兩半夏八兩以水六升先煮麻黃去上沫入諸藥煮取三升分三服又云肺脹咳而上氣煩躁而喘脈浮者心下有水小青龍加石膏主之肺脹咳而上氣者水寒之標邪也治以小青龍湯平其沖氣況方中安內攘外各盡其妙余仿其法以治寒嗽莫不有桴應鼓之效也麻黃芍藥桂枝細辛甘草乾薑各三錢五味子半夏各半升石膏二兩用水一斗先煮麻黃去上沫內諸藥煎服取三升強人服一升羸者減之日三服小兒服四合喘而自汗腹滿便祕氣口脈大於人迎下之無疑外此則不宜輕下也羅謙甫平氣散可用仲景云膈間支飲其人喘滿心下痞堅面色黧黑其脈沉緊得之數十日醫吐之不愈木防己湯主之木防己三兩石膏如雞子大十二枚桂枝二兩人參四兩以水六升煮取二升溫分二服虛者即愈實者三日復發復與不愈者宜木防己湯去石膏加茯苓芒硝湯主之微利即愈痰多者亦氣短而喘須察其平昔非因勞倦氣脫之症而發脈浮滑而大咽喉不利四七湯甚效氣鬱痰凝俗名梅核氣是也仲景治婦人胸中如有炙臠用半夏厚朴湯即此是也如是風痰可用千緡湯半夏七個煨四片破之皂角去皮尖二枚甘草炙一寸生薑如指大水一碗煎去半頓服又治因傷風而痰作喘逆兀兀欲吐噁心欲倒如夏月有此症為大熱也蓋此症隨四時為寒熱溫涼宜以酒黃連酒黃柏酒知母各等分為細末熟湯丸桐子大每服二百丸白湯送下空心服之仍多飲湯服畢少時便以善膳壓之使不得停留胃中直至下元以瀉衝脈之逆也衝脈上干逆氣不降之故平居則氣平和動則氣促而喘者亦衝脈之火宜用酒黃柏酒知母之屬凡瀉氣下痰定喘之藥施之形實痰多者為妙降氣行痰之藥損人真元正虛者宜審若一切虛症及脈浮大按之而澀者下之必死須謹之陰虛而喘脈弱而澀四肢寒者去死不遠慎勿下之宜用人參麥門冬五味當歸生地童便竹瀝之屬素問逆調論云夫不得臥則喘者是水氣之客也夫水者循津液而流也腎者水藏主津液主臥與喘也漢防己茯苓之屬主之又云不得臥而息有音者是陽明之逆也足三陽者下行今逆而上行故息有音也陽明者胃脈也胃者六腑之海其氣亦下行陽明逆不得從其道故不得臥也陽明徑道壅塞則其氣不能從道故不臥矣下經曰胃不和則臥不安此之謂也熟半夏橘紅之屬主之瀉泄瀉之病水穀或化或不化但大便泄水並無努責後重者是也脈細皮寒少氣瀉利不食為五虛死泄瀉而犯五虛中土已竭危候也參附湯尤不能挽必加七味白朮湯可以追其既失之脾陽而固其元氣試之效捷用人參附子之類救之亦有得生者脈緩時小結或微下留連者皆可治浮大洪數或緊或弦急皆難治脈數疾為熱沉細為寒虛豁為氣脫澀實為積滯弦而遲者為氣泄心脈止者為驚泄濕則瀉水腹不痛風則米穀不化而完出火則腹痛瀉水腸鳴痛一陳瀉一陳痰則或瀉或不瀉或多或少食則腹痛甚而瀉瀉後痛減腎虛則五更時便瀉常時則否寒則腹中冷痛洞下清水腹內雷鳴米飲不化濕者燥之虛者補之熱者清之寒者溫之有痰者行痰有積者消積氣陷則升之氣脫則澀之主方白朮炒二錢燥濕補脾白茯苓去粗皮分水白芍炒各一錢五分止腹痛又能補脾而伐肝陳皮去白一錢行氣甘草五分炙和中如的系傷濕者去白朮以蒼朮代之蓋白主收斂不若蒼能發散也仍加羌活一錢風能勝濕豬苓澤瀉各五分治濕不利小便非其治也脾虛者加人參一錢補脾氣之要藥木香砂仁各五分脾虛則氣不運故以藥之辛溫行氣而溫中以腐水穀也仍服戊癸丸方見脾門或將前方加蓮肉五錢陳糯米一合炒熟俱為末加白砂糖每朝空腹以白湯調服其功尤捷腎虛者加破故紙一錢五分益腎氣肉豆蔻一錢止虛泄二藥氣味相合能使脾腎之氣交相通而化水穀仍多服戊癸丸熱瀉糞色赤黃彈響作痛肛門焦痛糞出穀道如湯之熱煩渴小便不利宜以赤茯苓代白茯苓用為君蓋赤火色取其相入也熱既併入於大腸而作瀉今欲引歸前陰以分其勢故用為君仍加豬苓澤瀉滲利之藥各五分以佐之又加茵陳山梔仁各五分二味俱苦寒俱能解邪熱而利小便兼進如金丸方見後痰瀉加半夏曲一錢五分行痰用陳皮白茯苓各二錢治痰以行氣為先而茯苓能利水行津液故也虛者加人參一錢蓋痰氣多由脾虛不能運化也用竹瀝薑汁一盞加入服之如體實能食者不若加元明粉一錢就其勢從大便去之卻服收澀之劑食積瀉多噫氣如敗卵臭宜去白芍藥加枳實木香另磨俱理氣之藥一錢砂仁五分仍看所傷之物而用藥如傷肉食者加山楂傷米食者加神麯傷麵食者加蘿蔔子傷酒者加乾葛各一錢傷蟹者加丁香五分仍進保和丸方見傷食酒積每晨起必瀉本方內加人參乾葛各一錢白豆蔻仁吳茱萸各五分寒瀉加人參一錢熟附子乾葛各五分陽氣不足則寒故用人參補氣薑附已寒不能食者進八味丸元是寒瀉因瀉而寒燥引飲轉飲轉瀉者去白芍藥加乾薑黃連人參各一錢乾薑治初得之寒黃連解新增之熱寒何由動熱瀉久而虛故有虛熱也須用人參補之此理中湯加黃連也名連理湯多有奇效有一等盛暑又復內傷生冷及熱瀉暑瀉諸藥不效者疑似之間尤宜用此風瀉完穀不化丹溪以為脾虛前已列脾虛一條若用補脾藥不效便當治風素問云久風入中為飧泄又云春傷於風夏生飧泄而史記倉公傳又名之為回風足知完穀不化完穀不化乃回風之候連理湯必佐羌防以升之關竅通而伏風自去乃風症也宜本方內以蒼朮代白朮加羌活防風各一錢辛溫通關竅而去風升麻柴胡各加五分又經云清氣在下則飧泄故以二藥助甘辛之味引清氣而上升仍絶不與食一二日泄當自止暑月泄瀉與熱瀉同仍宜服六和湯方見暑門並啖浸冷西瓜數片又有一種氣瀉腸鳴氣走胸膈痞悶腹急而痛瀉則腹下寬須臾又急氣塞而不通者此由中脘停滯氣不流轉水穀不分所致宜於本方內以蒼朮代白朮去白芍藥以其酸收故去之加薑製厚朴結散氣大腹皮主氣攻心腹各一錢白蔻仁五分辛溫能下氣理中仍磨入木香汁服之木香治腹中氣不轉運又火煨之能實大腸如小便不利加豬苓澤瀉各五分並調進車前子散如口渴引飲加人參麥冬各一錢二藥何為能生津而止渴蓋脾氣上升於肺肺氣下降乃生津液而二藥能補脾肺故也升麻五分引清氣上朝於口烏梅肉五個酸能止渴如久瀉氣脫加人參一錢罌粟殼五個酸能止渴訶子皮二藥俱酸澀故能斂脫氣而止瀉肉豆蔻各一錢木香煨另磨砂仁各五分肉蔻止泄之要藥澀以固脫煨木香實大腸砂仁理氣瀉久氣必下陷須用升舉之藥加升麻柴胡各一錢羌活防風各五分風藥能鼓舞元氣上升有久瀉不止及瀉已愈而隔年及後期復瀉者有積故也宜本方內加三稜醋煮莪朮醋煮焙乾二藥消積各一錢木香砂仁各五分理氣兼進保和丸凡大便泄服理中湯小便不利大便反泄不知氣化之過本肺不傳化以純熱之藥治之是以轉泄少服則不瀉多服則愈熱所以不分若以陳皮青皮之類治之則可經曰膀胱者津液之府氣化則能出矣儒門事親云昔聞山東楊先生者治府主洞泄不已楊初未對病人與衆人談日月星辰纏度及風雲雷雨之變自辰至未而病者聽之而忘其圊楊嘗曰治洞泄不已之人先問其所好之事良醫治法變通化裁出奇制勝而愈其病非拘執藥餌一法其用心智慧非庸工所可揣度好棋者與之棋好樂者與之笛笙不輟按茲法匪直可以治泄即七情虛勞之類亦宜然是故枚生七發楚太子聞吳客之辨澀然汗出霍然病已雖是寓言實有此理也第曉日風雲之變者世已難其人而況可求之庸醫中乎可嘆可嘆白雲集云黃子厚者江西人也精醫術鄰郡一富翁病泄瀉彌年禮致子厚診療浹旬莫效子厚曰豫未得其説求歸一月讀易至乾卦天行健朱子有曰天之運旋不息故閣得地在中間如人弄碗只運動不住故空中不墜少有息則墜矣因悟嚮者富翁之病乃氣不能舉為下脫也又時持水滴吸水初以大指按滴上竅則水滿筒放其按則水下溜無餘乃豁然悟曰吾可以治翁證矣即治裝往翁家驚喜至即為治艾灸百會穴未三四十壯泄瀉止矣一人服內托藥大便大泄小便祕或用五苓散則全祕與陳皮茯苓氣化則效一人病虛服附子熱藥小便閉諸藥不效惟得黃連黃芩則效水腫既效方云有人陰腫醫以赤玉塗之令服八味丸而愈若久病而陰腫病已不可救宜速灸水分穴蓋水分能分水穀水穀不分故陰腫不特陰腫他處亦腫尤宜急服禹餘糧丸資生經云水腫惟得針水溝若針余穴水盡即死然灸水分則有效灸水分穴為治水腫至捷良法乃為要穴也有里醫為李生治水腫以藥飲之不效一日忽為灸水分與氣海穴翌早視其如削矣信乎水分之能治水腫也儒門事親云一男子目下腫如臥蠶狀戴人曰目之下陰也水亦陰也臀以為水之主其腫至於目下固也此由房室交接之時勞汗遇風風入皮腠皮腠得寒則閉風不能出與水俱行經云面腫曰風足脛腫曰水仲景名之曰風水故病如是不禁房室則死趙以德云嘉定沈氏年十八患胸腹身面俱腫醫治半月餘不效余診其脈六部俱不出用紫蘇桔梗之類煎服一盞胸有微汗再服則身盡汗其六部和平之脈皆出一二日其脈悉平鼓脹九靈山房集云鍾女病腹脹如鼓四肢骨立醫或以為孕為蟲為瘵也項彥章診其脈告曰此氣薄血室鍾曰服芎歸輩積歲月非血藥乎彥章曰失於順氣也夫氣道也血水也氣有一息之不運則血有一息之不行矣經曰氣血同出而異名故治血必先順其氣俾經墜得通而後血可行氣為血帥氣行而血亦行專治其血無益矣乃以蘇合香丸投之三日而腰作痛彥章曰血欲行矣急治芒硝大黃峻逐之下汙血纍纍如瓜者可數十枚應手而愈彥章所以知鍾女之病者以脈弦滑而且數弦者氣結滑者血聚實邪也故氣行而大下之瘳䐜脹趙以德云松江一男子年三十餘胸腹脹大發煩躁渴面赤不得臥而足冷余以其人素飲酒必酒後入內奪於所用精氣溢下邪氣因從之上逆逆則陰氣在上是生䐜脹濁氣在上清氣在下則生䐜脹其上焦之陽因下逆之邪所迫壅塞於上故發煩躁此因邪從下上而盛於上者也於是用吳茱萸附子人參輩以退陰逆水邪冷飲之以解上焦之浮熱入咽覺胸中頓爽少時腹中氣轉如牛吼泄氣七次明日其證愈矣範氏方云凡腹脹經久忽瀉數升晝夜不止服藥不效乃為氣脫宜用益智仁煎濃湯服之立愈脾胃今人只知脾胃虛則當補補之不應則補其母如是足矣而不知更有妙處補腎是也趙養葵云補脾不若補腎果腎虛命火微弱用八味丸為要方許叔微之二神丸法亦妙脾土克腎水不相為用如何反補其所勝以滋肝木曰不然此其妙正在相剋處也五行以相剋為用所以尚書大禹謨説個水火金木土谷惟修此聖人立言之妙其説長甚今且以水與土言之水不得土何處發出何處安著土不得水卻是一個燥坌物事如何生出萬物以水土相滋動植化生此造化相剋之妙而醫家所以謂脾為太陰濕土濕之一字分明土全賴水為用也故曰補脾必先補腎至於腎精不足則又須補之以味故古人又謂補腎不若補脾二言各有妙理不可偏廢也本事方云有人全不進食服補脾藥皆不效余授二神丸方服之頓能進食此病不可全作脾氣治蓋腎氣怯弱真元衰削是以不能消化飲食譬之鼎釜之中置諸米穀下無火力終日米不能熟其何能化黃魯直嘗記服菟絲子淘淨酒浸曝乾日挑數匙以酒下之十日外飲啖如湯沃雪亦知此理也岩氏濟生方云人之有生不善攝養房勞過度真陽衰虛坎火不溫不能上蒸脾土沖和失布中州不運是以飲食不進胸膈痞塞或不食而脹滿或食不消大腑溏泄古人云補腎不如補脾余謂補脾不如補腎腎氣若壯丹田火盛益火之原以消陰翳上蒸脾土脾土溫和中焦自治膈開能食矣按許岩之説皆與余説冥合然卻不知水土相滋之妙故猶諄諄以火為言是混水火為一途也薛氏云余嘗病脾胃服補藥及針灸脾俞等穴不應幾殆吾鄉盧丹谷先生令余服八味丸飲食果進三料而平余兄年逾四十貌豐氣弱遇風則眩勞則口苦生瘡胸嘗有痰目嘗赤澀又一人脾虛發腫皆以八味丸服之而愈此皆補腎之明驗也楊仁齋醫學恐當在丹溪之右有云脾腎之氣交通則水穀自然克化其見亦及此傷食肘後辨脾胃所傷變易形法凡諸脾脈微洪傷苦澀物經云咸勝苦微澀傷辣辛物經云苦勝辛微滑傷腥咸物經云甘勝咸洪緩傷甜爛物經云酸勝甘弦緊傷酸硬物經云辛勝酸微弦傷冷硬物經云溫以克之微遲傷冷痰積惡物經云溫胃化痰飲食過多脹痞不下尋常率以破氣之藥投之傷食惡食必有噫腐吞酸之候是食物既傷之前藥劑又攻之於後脾氣安得而健暢也必須以平補之藥為主佐以他藥一升一降使脾腎交通而水火既濟自然腐化矣積聚治積之法理氣為先氣既升降津液流暢積聚何由而生丹溪乃謂氣無形而不能作塊成聚只一消痰破血為主誤矣天地間有形之物每自無中生何止積聚也戴復庵以一味大七氣湯調氣和血使其升降自如津液周流灌溉臟腑無滯窒則積聚不攻而自化矣治一切積聚其知此道歟肝積肥氣用前湯煎熟待冷卻以鐵器燒通紅以藥淋之乘熱服肺積息賁用前湯加桑白皮半夏杏仁各五分心積伏梁用前湯加石菖蒲半夏各五分脾之積痞氣用前湯下紅丸子腎之積奔豚用前湯倍桂加茴香炒楝子肉各五分諸氣今人治一切氣疾止知求之脾肺而不知求之腎所以鮮效夫腎間動氣為五臟六腑之本十二經脈之根呼吸之門三焦之原房勞過度或稟受素弱腎經不足氣無管束遂多鬱滯是生諸疾諸氣膹郁皆屬於肺氣主煦之若鬱結不舒氣機凝滯血亦因之痹塞則諸病生矣故百病皆生於郁是其明證醫者以為是當理氣殼朴香附烏藥之類雜然而前陳而氣愈不可理矣宣之泄之以快藥下之而人之死者過半矣於是醫之中見稍高者以為脾虛不能運化精微之故而從事於補脾然僅可以苟延歲月而多至於因循蹉跎而不救此不知補腎之過也宜以破故紙茴香子葫蘆巴之類主之氣藥內須兼用和血之藥佐之蓋未有氣滯而血能和者血不和則氣益滯矣諸血證攖寧生卮言云古人言諸見血非寒證皆以血為熱迫遂至妄行然皆復有所挾也或挾風或挾濕或挾氣又有因藥石而發者其本皆熱上中下治各有所宜在上則梔子黃芩黃連芍藥犀角蒲黃而濟以牡丹皮生地黃之類古人云有冒風寒正以陽明火邪為風所扇而血為之動中間有桂取其能伐木也若蒼朮地榆白芍藥之類而濟以火劑大腸血以手陽明火邪為風為濕也治以火劑風劑風能勝濕也如黃連黃芩芍藥柏皮荊芥防風羌活之類兼用雞冠花則又述類之義也血溢血泄諸蓄妄症其始也余率以桃仁大黃行血破瘀之劑以折其鋭氣凡初期驟然吐血亟宜快藥下之折其鋭氣若日久正氣已虛法當調攝仲景云亡血虛家不可下是也而後區別治之雖往往獲中然猶不得其所以然也後來四明遇故人蘇伊舉曰吾鄉有善醫者忘其姓字每治失血蓄妄必先以快藥下之或問失血復下虛何以當則曰血既妄行迷失故道不去蓄積則以妄為常曷以潔之且去者自去生者自生何虛之有余聞之愕然曰名言也昔之疑今而後釋之矣又云婦人之於血也經水蓄則為胞胎蓄者自蓄生者自生及其産育為惡露則去者自去生者自生其蘊而為乳則無腹下漏而為月矣失血為血家妄逆産乳婦人常事其去其生則一同也失血家須用下劑破血蓋施之於蓄妄之初亡血虛家不可下蓋戒之於亡失之後又云驚而動血者屬心怒而動血者屬肝憂而動血者屬肺思而動血者屬脾勞而動血者屬腎又云吐血則足陽明隨經上行滲溢胃脘而為之也小便血足太陽隨經入膀胱也又云大便前後下血便前由手陽明隨經下行滲入大腸傳於廣腸而下者也便後由足陽明隨經入胃陰絡傷血內溢淫溢而下者也古人所謂近血遠血是也又云咯血為病最重咯血乃虛勞之漸其症最危且難治者以肺手太陰之經氣多血少又肺者金象為清肅之藏今為火所制迫而上行以為咯血逆之甚矣上氣見血下病聞音謂喘而咯血且痰咳嗽也又云從高墜下驚僕擊搏流滯惡血皆從中風論終歸於厥陰此海藏之説蓋厥陰多血其化風木是以然也有形當從血診無形當從常治夏仲庸因蹈海驚悸心為不寧是為無形從風家治之而愈又云唾血責在下焦陽火煎迫擊為之也唾血屬腎虛火炎腎主唾為足少陰少血多氣故其症亦為難治又有所謂腸風藏毒者腸風則足陽明積熱久而為風風有所以動之也臟毒則足太陰積熱久而生濕從而下流也風則陽受之濕則陰受之曹氏必用方云吐血須用乾薑甘草作湯與服或四物理中湯亦可如此無不愈者若服生地黃竹茹藕汁去生便遠出血不止九靈山房集云湖心寺僧履者一日偶搔膕音國曲腳也中疥忽自血出汩汩如湧泉肌衄者內經名之血汗是也集驗方用黃芩漬水擦之屢試良方也竟日不止瘍醫治療勿效邀呂元膺往視履時已困極無氣可語及持其脈惟尺部如蛛絲他部皆無即告之曰夫脈氣血之先也今血妄溢故榮氣暴衰然兩尺尚可按惟當益營以瀉其陰火乃作四神湯加荊芥穗防風不間晨夜並進明日脈漸出更服十全大補湯一劑遂痊嘔血宜降氣不宜降火水曰潤下火曰炎上引其氣而使之下即以水剋火之理是降氣即所以降火也若用苦寒之藥以降火火萬無降理蓋炎上作苦苦先入心故芩連之苦本助火入心經之藥而名為降火者徒以其寒耳寒能凝血苦能傷胃是非但不能抑上升之氣而使之平行橫溢之血而使之歸源害且有不可勝言也可不戒哉宜行血不宜止血凡嘔血之症其始也未有不病胸脅痛者蓋由平日起居失節致血停瘀之久不能歸源滿而溢焉遂發為嘔殆非一日之積矣使其流行宣暢散行百脈又何嘔之有故凡治嘔血之症必須用行血之藥宣其餘滯而推陳以致新焉血既流行胃脘清楚自不出矣是行之乃所以止之也醫往往拘泥犀角地黃湯等過於涼血雖間或止之其後常患胸脅大痛腫滿等症以致不起蓋血得涼則陳者不行新者不生瘀物愈積而真元愈削故也況血不可止而強欲止之奚得乎恙由郁久化火外襲暑熱故傾盆嘔出危殆已極諸藥不受余曾治一婦危在頃刻因思諸藥皆苦寒是以投以即嘔借用八汁飲冀其甘寒可以入胃清上血止再商投之果應方載治驗録參觀可也宜補肝不宜伐肝肝藏血血陰物也陰難成而易虧又肝為東方木於時為春為發生之臟宜滋養而不宜克伐先醫謂肝無補法大謬論也失血之後肝藏空虛汲汲焉實之不暇而敢以纖毫平肝之藥伐之哉往往見其治疝脹諸症謂為肝火有餘而用平肝之藥以致爪青囊縮而不起者則肝之不可伐也亦明矣餘外兄虞檢庵病嘔血醫欲用降火平肝止血之藥而余貽尺牘止之奈雖用余言從事於補而時止時作大率吐後新血既生四五日還復吐出遷延歲月忽得散脈知決不可為矣更數日卒蓋自得病以來未嘗瞑目而臥也肝為藏血之臟故人臥則血歸肝今肝臟虛極不足以攝血而榮衛之氣亦不復行於表分故不復瞑目而臥則血無所歸矣血無所歸故積久而復吐出自然之理也余一時思不及此心常缺然歲己卯秋始晤繆仲淳于白下相得甚歡忽謂余曰補血須用酸棗仁余灑然有省嗟乎一人之心思有限而病態無窮非博覽而約取捨己而從人即精如盧扁不能無失也而況資庸智喑學儉識寡者乎既用自針因書之以詔來者庸俗每言伐肝貽害匪淺往往延成痼疾殞身者有之第未明肝為藏血之臟人臥血歸於肝若肝虛不足以攝血故目不瞑若用補血養肝血有所歸如茯神龍眼肉酸棗仁等隨症擇用所以醫貴博覽約取虛心研究以匡其不逮眩暈北夢瑣言云有少年苦眩暈眼花常見一鏡子趙卿診之曰來晨以魚鱠奉候及期延於內從容久飢候客退方得交接俄而臺上施一甌芥醋更無他味少年飢甚聞芥醋香徑啜之逡巡再啜遂覺胸中豁然眼花得見卿雲君吃魚鱠太多故權誑而愈其疾古名醫治病必詳其原隨病化裁出奇制勝以冀必效近世稍有微名一切書籍置之高閣自以為得軒歧真傳若是者誤人匪淺午夜捫心能無愧乎余雖昏耄仍不敢掉以輕心若應一診歸必記病源參稽古籍所以慎之也頭痛東垣云高巔之上惟風可到故味之薄者陰中之陽自地升天者也所以頭痛皆用風藥治之總其大體而言之也然患痛人血必不活而風藥最能燥血故有愈治而愈甚者此其要尤在養血不可不審也一人寒月往返燕京感受風寒遂得頭痛數月不愈一切頭風藥無所不服厥痛愈甚肢體瘦削扶策踵門求余方藥余思此症明是外邪緣何解散不效語不云乎治風先治血血活風自滅本因血虛而風熱入之今又疏泄不已烏乎能愈也又聞之痛則不通通則不痛用當歸生血活血用木通通利關竅血脈以行當歸之力問渠能酒乎曰能而且多近為醫戒之不敢飲因今用斗酒入二藥其中浸三晝夜重湯煮熟乘熱飲之至醉則去枕而臥臥起其痛如失所以用酒者欲二藥之性上升於頭也至醉乃臥者醉則浹肌膚淪骨髓藥力方到臥則血有所歸其神安也有志活人者推此用之思過半矣火鬱於上而痛者經云火淫所勝民病頭痛治以寒劑宜酒芩石膏之類治之又不可泥於此法也又一方用當歸二錢川芎二錢連翹二錢熟地二錢水煎六分去渣以龍腦薄荷二錢置碗底將藥乘滾衝下鼻吸其氣俟溫即服服即安臥其效甚速然此亦為血虛者設耳頭痛六經各有見證如太陽頭痛上至巔頂項強腰脊必痛陽明痛在額前必目珠亦痛便祕口渴少陽痛在頭角口苦咽乾目眩是也太少兩陰若有痰氣壅塞清陽不升頭亦為之痛挾六淫之所幹所血之盛衰皆能致痛也腦痛腦者髓之海也髓不足則腦為之痛宜茸珠丹之類治之若用風藥久之必死腦為元神之府稍受微邪即現不支之態內經謂之真頭痛旦發夕死雖進茸珠丹恐亦無濟於事矣牙疼牙疼以平胃散入梅花片腦少許研勻擦之立效有胃熱腎虛之因分辨明晰庶免遺誤平胃加片腦僅散濕熱而已心痛難經云陰維為病苦心痛陰維行諸陰而主榮榮為血血屬心故苦心痛也潔古云其治在足少陽二陰交仲景太陰證則理中湯少陰證則四逆湯厥陰證則當歸四逆吳茱萸湯陰維為病苦心痛若手足厥逆危候也
