body:
  text: 原序醫自軒岐重民生諄諄問答通天地之化洞陰陽之理比之典謨更為窮頤其慎重若此故明於此道者自周歷漢晉唐宋金元著述可法者不過數十家亦各有所長此道之難又若此然稟上資不得原委師承終亦鹵莽昔扁鵲得禁方於長桑太倉授診奇於陽慶葛洪承秘術於鄭隱思邈得仙法於龍宮元素之夢授李明之正傳朱丹溪之埽門於羅太無王光庵之啟鑰於戴元禮故吳中醫派得其正脈宇泰先生飛聲翰苑博綜經史少好方書自素難金匱甲乙諸經下逮諸子莫不精探淵奧其自敘云余發始燥慕范文正公存心濟物立志甚切攜李孝廉謙所先生與先生同年惟契謙所先生蜃川簡肅公仲子英華偉量敦好奇書得先生醫論欲廣濟宇內不秘帳中每命諸英輩刊布未遑宇泰先生嘗云吳中自王光庵得元禮之秘再傳啟東諸賢醫道大振又云丹溪纂要諸書非丹溪手筆謬於選擇爰命高生訪求朱氏原本重訂斫輪遊刃莫不臻妙此書若江海之波瀾山嶽之嶺峰舟楫之帆檣壁壘之標幟其為證治諸書之選錄安可忽諸又覽先生髮熱論云靈素甲乙諸書發熱針法大妙世醫罕知所取其五臟補瀉之經絡用藥可代余欲一一立方但恐印定後人眼目則知先生圓神又出竿頭矣攜李殷仲春頓首序
